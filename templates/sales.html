<h2>Sales History</h2>

{% for sale in sales %}
    <div style="margin-bottom: 20px;">
        <h3>{{ sale.invoice_no }} - {{ sale.total }}</h3>

        <ul>
            {% for item in sale.items.all %}
                <li>
                    {{ item.product.name }} - {{ item.qty }} - {{ item.subtotal }}
                </li>
            {% endfor %}
        </ul>
    </div>
{% empty %}
    <p>No sales yet</p>
{% endfor %}
